name: Run checks, tests and docker build

on: push

jobs:
  lint:
    runs-on: ubuntu-22.04

    steps:

    - name: Set up Java 21
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '21'

    - uses: actions/checkout@v6

    - uses: actions/cache@v5
      with: { path: "~/.m2", key: "${{ runner.os }}-m2" }

    - name: Install clj runtime
      run: |
        .github/workflows/install-binaries.sh
        echo "${PWD}/bin" >> $GITHUB_PATH

    - name: Run linters
      run: make lint

  test:
    runs-on: ubuntu-22.04

    steps:

    - name: Set up Java 21
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '21'

    - uses: actions/checkout@v6

    - uses: actions/cache@v5
      with: { path: "~/.m2", key: "${{ runner.os }}-m2" }

    - name: Install clj runtime
      run: |
        .github/workflows/install-binaries.sh
        echo "${PWD}/bin" >> $GITHUB_PATH

    - name: Run tests
      env:
        CLIENTS_INFO_PATH: ${{ secrets.CLIENTS_INFO_PATH }}
        CLIENT_ID: ${{ secrets.CLIENT_ID }}
        CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
        GATEWAY_PASSWORD_V5: ${{ secrets.GATEWAY_PASSWORD_V5 }}
        GATEWAY_ROOT_URL_V5: ${{ secrets.GATEWAY_ROOT_URL_V5 }}
        GATEWAY_USER_V5: ${{ secrets.GATEWAY_USER_V5 }}
        GATEWAY_PASSWORD_V6: ${{ secrets.GATEWAY_PASSWORD_V6 }}
        GATEWAY_ROOT_URL_V6: ${{ secrets.GATEWAY_ROOT_URL_V6 }}
        GATEWAY_USER_V6: ${{ secrets.GATEWAY_USER_V6 }}
        KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
        KEYSTORE_JKS_B64: ${{ secrets.KEYSTORE_JKS_B64 }}
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        RIO_RECIPIENT_OIN: ${{ secrets.RIO_RECIPIENT_OIN }}
        RIO_READ_URL: ${{ secrets.RIO_READ_URL }}
        RIO_UPDATE_URL: ${{ secrets.RIO_UPDATE_URL }}
        RIO_SENDER_OIN: ${{ secrets.RIO_SENDER_OIN }}
        SURF_CONEXT_CLIENT_ID: ${{ secrets.SURF_CONEXT_CLIENT_ID }}
        SURF_CONEXT_CLIENT_SECRET: ${{ secrets.SURF_CONEXT_CLIENT_SECRET }}
        SURF_CONEXT_INTROSPECTION_ENDPOINT: ${{ secrets.SURF_CONEXT_INTROSPECTION_ENDPOINT }}
        TOKEN_ENDPOINT: ${{ secrets.TOKEN_ENDPOINT }}
        KEYSTORE: test/keystore.jks

      run: make test

    - name: Start Redis
      uses: supercharge/redis-github-action@1.8.1
      with:
        redis-version: 6.2

    - name: Run tests with redis
      run: make test-redis

  specs:
    runs-on: ubuntu-22.04

    steps:

    - name: Set up Java 21
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '21'


    - uses: actions/checkout@v6
    - uses: actions/cache@v5
      with: { path: "~/.m2", key: "${{ runner.os }}-m2" }

    - name: Install clj runtime
      run: |
        .github/workflows/install-binaries.sh
        echo "${PWD}/bin" >> $GITHUB_PATH

    - name: Proof data specs
      run: make proof-specs

  uberjar:
    runs-on: ubuntu-22.04

    steps:
    - name: Set up Java 21
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '21'

    - uses: actions/checkout@v6

    - uses: actions/cache@v5
      with: { path: "~/.m2", key: "${{ runner.os }}-m2" }

    - name: Install clj runtime
      run: |
        .github/workflows/install-binaries.sh
        echo "${PWD}/bin" >> $GITHUB_PATH

    - name: Run compile
      run: make jar

  docker-build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v6

    - name: Run docker build
      run: docker build -f Dockerfile.v5 .

    - name: Run docker build
      run: docker build -f Dockerfile.v6 .
      
