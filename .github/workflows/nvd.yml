name: Check deps for vulnerabilities

on:
  push:
    branches: ["*"]
    tags: ["*"]
  schedule:
    - cron: '0 1 * * 1,2,3,4,5' # every workday

jobs:
  deps:
    runs-on: ubuntu-22.04

    steps:

    - name: Set up Java 21
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Checkout code
      uses: actions/checkout@v6

    - name: Cache maven repository
      uses: actions/cache@v5
      with:
        path: "~/.m2/repository"
        key: "${{ runner.os }}-clojure-${{ hashFiles('**/deps.edn') }}"

    # Restore the NVD (OWASP vulnerability database) so clj-watson only has
    # to fetch incremental updates instead of re-downloading ~350k records.
    # The path matches `data.directory` in .watson.properties — keeping it
    # outside ~/.m2 avoids the version-pinned default under
    # dependency-check-utils/<version>/data/, which broke whenever the
    # floating "RELEASE" version bumped.
    # Restore/save are split so the cache still saves when the scan fails
    # (scan exits non-zero on any CVE found). The run_id in the key forces
    # a fresh save each run; restore-keys falls back to the most recent
    # prior cache.
    - name: Restore NVD database cache
      id: nvd-cache
      uses: actions/cache/restore@v5
      with:
        path: "~/.owasp-nvd-cache"
        key: "${{ runner.os }}-nvd-${{ github.run_id }}"
        restore-keys: |
          ${{ runner.os }}-nvd-

    - name: Install clj runtime
      run: |
        .github/workflows/install-binaries.sh
        echo "${PWD}/bin" >> $GITHUB_PATH

    - name: Check that NVD Secret is set
      env:
        NVD_API_TOKEN: ${{ secrets.NVD_API_TOKEN }}
      if: ${{ env.NVD_API_TOKEN == '' }}
      run: echo "NVD_API_TOKEN secret is empty"; exit 1

    - name: Check clojure dependencies with NVD
      id: watson
      env:
        CLJ_WATSON_NVD_API_KEY: ${{ secrets.NVD_API_TOKEN }}
      run: |
        make watson

    # `if: always()` so a failing scan (e.g. a CVE was found) still updates
    # the cache. Skipped when the watson step didn't run at all, since
    # there'd be no incremental update worth saving.
    - name: Save NVD database cache
      if: always() && steps.watson.outcome != 'skipped'
      uses: actions/cache/save@v5
      with:
        path: "~/.owasp-nvd-cache"
        key: "${{ runner.os }}-nvd-${{ github.run_id }}"
