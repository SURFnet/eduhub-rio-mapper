name: Check deps for vulnerabilities

on:
  workflow_call:
    secrets:
      NVD_API_TOKEN:
        required: true
  push:
    branches:
      - 'main'
  schedule:
    - cron: '0 1 * * 1,2,3,4,5' # every workday

jobs:
  deps:
    runs-on: ubuntu-22.04

    steps:

    - name: Set up Java 21
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Checkout code
      uses: actions/checkout@v6

    - name: Cache maven repository
      uses: actions/cache@v5
      with:
        path: "~/.m2/repository"
        key: "${{ runner.os }}-clojure-${{ hashFiles('**/deps.edn') }}"

    - id: get-dates
      shell: bash
      run: |
        echo "today=$(/bin/date -u "+%Y%m%d")" >> $GITHUB_OUTPUT
        echo "yesterday=$(/bin/date -u "+%Y%m%d" --date=yesterday)" >> $GITHUB_OUTPUT
        echo "two_days_ago=$(/bin/date -u "+%Y%m%d" --date='2 days ago')" >> $GITHUB_OUTPUT
        echo "three_days_ago=$(/bin/date -u "+%Y%m%d" --date='3 days ago')" >> $GITHUB_OUTPUT

    - name: Restore NVD database
      uses: actions/cache/restore@v5
      with:
        path: "~/.m2/repository/org/owasp/dependency-check-utils/*/data"
        key: "${{ runner.os }}-nvd-${{ steps.get-dates.outputs.today }}"
        restore-keys: |
          ${{ runner.os }}-nvd-${{ steps.get-dates.outputs.yesterday }}
          ${{ runner.os }}-nvd-${{ steps.get-dates.outputs.two_days_ago }}
          ${{ runner.os }}-nvd-${{ steps.get-dates.outputs.three_days_ago }}
          ${{ runner.os }}-nvd

    - name: Install clj runtime
      run: |
        .github/workflows/install-binaries.sh
        echo "${PWD}/bin" >> $GITHUB_PATH

    - name: Check that NVD Secret is set
      env:
        NVD_API_TOKEN: ${{ secrets.NVD_API_TOKEN }}
      if: ${{ env.NVD_API_TOKEN == '' }}
      run: echo "NVD_API_TOKEN secret is empty"; exit 1

    - name: Check clojure dependencies with NVD
      env:
        CLJ_WATSON_NVD_API_KEY: ${{ secrets.NVD_API_TOKEN }}
      run: |
        make watson

    - name: Save NVD database
      if: always()
      uses: actions/cache/save@v5
      with:
        path: "~/.m2/repository/org/owasp/dependency-check-utils/*/data"
        key: "${{ runner.os }}-nvd-${{ steps.get-dates.outputs.today }}"
